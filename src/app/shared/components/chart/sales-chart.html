<div class="chart-container" (mousemove)="onMouseMove($event)">
  <svg [attr.width]="'100%'"
       [attr.viewBox]="'0 0 ' + svgWidth + ' ' + svgHeight"
       preserveAspectRatio="xMidYMid meet"
       class="chart-svg">

    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#8B1A1A" stop-opacity="0.25" />
        <stop offset="100%" stop-color="#8B1A1A" stop-opacity="0.02" />
      </linearGradient>
    </defs>

    <!-- Y-axis labels -->
    @for (tick of yTicks(); track tick.value) {
      <text [attr.x]="leftPad - 12" [attr.y]="tick.y + 4"
            fill="#9CA3AF" font-size="10" text-anchor="end">
        {{ tick.label }}
      </text>
    }

    <!-- Vertical grid lines -->
    @for (point of points(); track point.label; let i = $index) {
      <line [attr.x1]="point.x" [attr.y1]="chartTop"
            [attr.x2]="point.x" [attr.y2]="chartBottom"
            stroke="#F0F0F0" stroke-width="1" />
    }

    <!-- Area fill -->
    <path [attr.d]="areaPath()" fill="url(#areaGrad)" />

    <!-- Line -->
    <path [attr.d]="linePath()" fill="none" stroke="#8B1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Data points and labels -->
    @for (point of points(); track point.label; let i = $index) {
      <g class="point-group"
         (mouseenter)="onPointEnter(i, $event)"
         (mouseleave)="onPointLeave()">

        <!-- Hit area -->
        <rect [attr.x]="point.x - 20" [attr.y]="chartTop"
              width="40" [attr.height]="chartHeight + 20"
              fill="transparent" />

        <!-- Month label -->
        <text [attr.x]="point.x" [attr.y]="chartBottom + 20"
              fill="#9CA3AF" font-size="11" text-anchor="middle">
          {{ point.label }}
        </text>

        <!-- Hover dot -->
        @if (hoveredIndex() === i) {
          <circle [attr.cx]="point.x" [attr.cy]="point.y"
                  r="5" fill="white" stroke="#8B1A1A" stroke-width="2.5" />
        }
      </g>
    }
  </svg>

  <!-- Tooltip -->
  @if (hoveredIndex() !== null) {
    <div class="chart-tooltip"
         [style.left.px]="tooltipLeft()"
         [style.top.px]="tooltipTop()">
      <div class="font-semibold text-gray-900">{{ data()[hoveredIndex()!].label }}</div>
      <div class="text-gray-500">{{ formatCurrency(data()[hoveredIndex()!].value) }}</div>
    </div>
  }
</div>
