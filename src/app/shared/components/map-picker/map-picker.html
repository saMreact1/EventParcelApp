<div class="map-overlay" (click)="onOverlayClick($event)">
  <div class="map-dialog">
    <!-- Header -->
    <div class="map-header">
      <h3 class="map-title">Choose Location</h3>
      <button (click)="cancel()" class="close-btn">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Search -->
    <div class="search-container">
      <div class="search-wrapper">
        <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
        </svg>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (ngModelChange)="onSearch()"
          placeholder="Search for a venue or address in Nigeria..."
          class="search-input" />
        @if (isSearching) {
          <div class="search-spinner"></div>
        }
      </div>

      @if (searchResults.length > 0) {
        <div class="search-results">
          @for (result of searchResults; track result.lat + result.lon) {
            <button class="search-result-item" (click)="selectSearchResult(result)">
              <svg class="result-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
              </svg>
              <span class="result-text">{{ result.display_name }}</span>
            </button>
          }
        </div>
      }
    </div>

    <!-- Map -->
    <div #mapContainer class="map-container"></div>

    <!-- Selected Location Info -->
    @if (selectedAddress) {
      <div class="selected-info">
        <div class="selected-icon">
          <svg class="h-4 w-4 text-[#8B1A1A]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
          </svg>
        </div>
        <div class="selected-text">
          <p class="selected-address">{{ selectedAddress }}</p>
          @if (selectedCity) {
            <p class="selected-city">{{ selectedCity }}</p>
          }
        </div>
      </div>
    }

    <!-- Actions -->
    <div class="map-actions">
      <button (click)="cancel()" class="cancel-btn">Cancel</button>
      <button (click)="confirm()" [disabled]="!selectedAddress" class="confirm-btn">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
        </svg>
        Confirm Location
      </button>
    </div>
  </div>
</div>
