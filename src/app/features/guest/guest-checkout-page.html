<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <div class="bg-white border-b border-gray-200">
    <div class="mx-auto max-w-2xl px-4 py-4 sm:px-6 flex items-center justify-between">
      <button (click)="goBack()" class="text-sm text-gray-500 hover:text-[#8B1A1A] flex items-center gap-1">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back
      </button>
      <span class="text-sm font-semibold text-gray-900">Checkout</span>
      <div class="w-12"></div>
    </div>
  </div>

  <div class="mx-auto max-w-2xl px-4 py-6 sm:px-6">
    @if (error()) {
      <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        {{ error() }}
      </div>
    }

    <!-- Order Summary -->
    <div class="rounded-xl border border-gray-200 bg-white p-4 mb-6">
      <h3 class="text-sm font-semibold text-gray-900 mb-3">Order Summary</h3>
      <div class="space-y-2 text-sm">
        @for (item of orderItems; track item.eventPackageId) {
          <div class="flex justify-between">
            <span class="text-gray-600">Package #{{ item.eventPackageId }} x {{ item.quantity }}</span>
          </div>
        }
        <div class="border-t border-gray-100 pt-2 flex justify-between font-semibold">
          <span>Total</span>
          <span class="text-[#8B1A1A]">{{ formatPrice(totalAmount()) }}</span>
        </div>
      </div>
    </div>

    <!-- Guest Details + Delivery Form -->
    <form [formGroup]="checkoutForm" (ngSubmit)="onSubmit()">
      <!-- Personal Details -->
      <div class="rounded-xl border border-gray-200 bg-white p-4 space-y-4 mb-4">
        <h3 class="text-sm font-semibold text-gray-900">Your Details</h3>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
          <input type="text" formControlName="guestName" placeholder="Enter your full name"
                 class="block w-full rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 focus:border-[#8B1A1A] focus:outline-none focus:ring-2 focus:ring-[#8B1A1A]/20" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number *</label>
          <input type="tel" formControlName="guestPhone" placeholder="e.g. 08012345678"
                 class="block w-full rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 focus:border-[#8B1A1A] focus:outline-none focus:ring-2 focus:ring-[#8B1A1A]/20" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email (optional)</label>
          <input type="email" formControlName="guestEmail" placeholder="your@email.com"
                 class="block w-full rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 focus:border-[#8B1A1A] focus:outline-none focus:ring-2 focus:ring-[#8B1A1A]/20" />
        </div>
      </div>

      <!-- Delivery Address -->
      <div class="rounded-xl border border-gray-200 bg-white p-4 space-y-4 mb-6">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <svg class="h-4 w-4 text-[#8B1A1A]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10m0 0a2 2 0 002 2h1m2-2a2 2 0 002-2m-2 2v2a2 2 0 002 2h10a2 2 0 002-2v-2m-2 2h-1m-1-4a2 2 0 002-2m-2 2h-1m-4-2a2 2 0 002 2m0 0h1m-6-2h1"/>
            </svg>
            <h3 class="text-sm font-semibold text-gray-900">Delivery Address</h3>
          </div>
          <button type="button" (click)="openMap()"
                  class="inline-flex items-center gap-1.5 rounded-lg border border-[#8B1A1A] bg-white px-3 py-1.5 text-xs font-semibold text-[#8B1A1A] hover:bg-[#8B1A1A]/5 transition-colors">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
            </svg>
            Choose on Map
          </button>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Street Address *</label>
          <input type="text" formControlName="deliveryAddress" placeholder="Street address, house number, area..."
                 class="block w-full rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 focus:border-[#8B1A1A] focus:outline-none focus:ring-2 focus:ring-[#8B1A1A]/20" />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">City *</label>
            <input type="text" formControlName="deliveryCity" placeholder="Lagos"
                   class="block w-full rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 focus:border-[#8B1A1A] focus:outline-none focus:ring-2 focus:ring-[#8B1A1A]/20" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">State</label>
            <input type="text" formControlName="deliveryState" placeholder="Lagos State"
                   class="block w-full rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 focus:border-[#8B1A1A] focus:outline-none focus:ring-2 focus:ring-[#8B1A1A]/20" />
          </div>
        </div>
      </div>

      <div>
        <button type="submit"
                [disabled]="checkoutForm.invalid || isSubmitting()"
                class="w-full rounded-lg bg-[#8B1A1A] px-6 py-3 text-sm font-semibold text-white hover:bg-[#6D1515] disabled:opacity-50 transition-colors flex items-center justify-center gap-2">
          @if (isSubmitting()) {
            <div class="h-4 w-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            Processing...
          } @else {
            Pay {{ formatPrice(totalAmount()) }}
          }
        </button>
        <p class="mt-3 text-xs text-center text-gray-400">Secure payment powered by Paystack</p>
      </div>
    </form>
  </div>
</div>

<!-- Map Picker -->
@if (showMap()) {
  <app-map-picker
    (locationSelected)="onLocationSelected($event)"
    (cancelled)="onMapCancelled()">
  </app-map-picker>
}
